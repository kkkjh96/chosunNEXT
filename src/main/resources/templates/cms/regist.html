<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대시보드</title>

    <!-- CSS 스타일 -->
    <link rel="stylesheet" href="/css/cms/sidebar.css">
    <link rel="stylesheet" href="/css/cms/register.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Toast UI Editor 최신 버전 CDN -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">

    <!-- Editor 스타일 추가 -->
    <style>
        #editor {
            height: 400px;
            margin-bottom: 10px;
        }
        /* textarea 가 required 체크에 걸리지 않도록 visibility 사용 */
        #editor-content {
            visibility: hidden;
            height: 1px;
        }
    </style>
</head>
<body>
<div class="wrap">

    <div th:replace="~{layout/cms/side_menu :: side_menu}"></div>

    <!-- 기사 작성 영역 -->
    <div class="article_regist_wrap">
        <p>기사 작성</p>
        <form id="article_form"  method="post">
            <input type="hidden" id="user_id" name="userId" th:value="${session.user.username}">
            <div class="form_wrap">
                <div class="content_wrap">
                    <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required> <br>
                    <input type="text" id="sub_title" name="subTitle" placeholder="부제목을 입력하세요" required>

                    <!-- Toast UI Editor 영역 -->
                    <div id="editor"></div>
                    <textarea id="editor-content" name="content" required></textarea>
                </div>

                <div class="section_2">
                    <div class="reservation_type">
                        예약배포 : <input type="datetime-local" name="reservationTime" id="reservation_time">

                        <div style="margin: 10px 0;">
                            <p>news_type</p>
                            <label><input type="radio" name="newsType" value="속보"> 속보</label>
                            <label><input type="radio" name="newsType" value="단독"> 단독</label>
                        </div>
                    </div>

                    <div class="category">
                        <p>카테고리 선택</p>
                        <label for="main_category">대분류</label>
                        <select id="main_category" name="mainCategoryCd" required>
                            <option value="">대분류를 선택하세요</option>
                            <th:block th:each="category : ${categories}">
                                <option th:if="${category.parentCd == 'MAIN_CATEGORY_CD'}"
                                        th:value="${category.cd}"
                                        th:text="${category.cdKor}"></option>
                            </th:block>

                        </select>

                        <label for="sub_category">소분류</label>
                        <select id="sub_category" name="sub_category_cd" required>
                            <option value="">소분류를 선택하세요</option>
                        </select>

                        <label for="reporter">바이라인</label>
                        <select id="reporter" name="reporter" required>
                            <option value="">기자를 선택하세요</option>
                            <th:block th:each="reporter : ${reporters}">
                                <option th:value="${reporter.name}" th:text="${reporter.name}"></option>
                            </th:block>
                        </select>

                    </div>

                    <button type="submit" style="margin-top: 10px;" id="submitBtn">저장</button>

                </div>

            </div>
        </form>
    </div>
</div>

<!-- Toast UI Editor 스크립트 -->
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script type="application/json" id="categoryData" th:utext="${categoriesJson}"></script>

<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function () {

        // ✅ Toast UI Editor 초기화
        const editor = new toastui.Editor({
            el: document.querySelector('#editor'),
            height: '800px',
            initialEditType: 'wysiwyg',
            previewStyle: 'vertical'
        });



        const categoryDataElement = document.getElementById("categoryData");
        let categories = [];

        try {
            categories = JSON.parse(categoryDataElement.textContent.trim());
            console.log("✅ 카테고리 데이터:", categories);
        } catch (error) {
            console.error("JSON 파싱 오류:", error);
            return;
        }

        const mainCategory = document.getElementById("main_category");
        const subCategory = document.getElementById("sub_category");

        mainCategory.addEventListener("change", function () {
            const selectedMainCategory = mainCategory.value;
            subCategory.innerHTML = '<option value="">소분류를 선택하세요</option>'; // 초기화

            // ✅ 선택한 대분류에 해당하는 소분류 필터링
            const filteredSubCategories = categories.filter(cat => cat.parentCd === selectedMainCategory);

            filteredSubCategories.forEach(cat => {
                const option = document.createElement("option");
                option.value = cat.cd;
                option.textContent = cat.cdKor;
                subCategory.appendChild(option);
            });
        });



        //////////////////////////////////////////////////
        document.getElementById('submitBtn').addEventListener('click', function(event) {
            event.preventDefault(); // 기본 폼 제출 막기

            const content = editor.getHTML();  // 에디터 내용 가져오기
            document.getElementById('editor-content').value = content;

            const userId = document.getElementById('user_id') ? document.getElementById('user_id').value : "";
            const newsTypeElement = document.querySelector('input[name="news_type"]:checked');
            const news_type = newsTypeElement ? newsTypeElement.value : null;
            const writerElement = document.getElementById('reporter');
            const writer = writerElement ? writerElement.value : null;

            const mainCategory = document.getElementById("main_category");
            const subCategory = document.getElementById("sub_category");
            // ✅ mainCategory 값 확인
            if (!mainCategory.value) {
                alert("대분류를 선택하세요.");
                return;
            }

            const newsData = {
                userId: userId,
                title: document.getElementById('title').value,
                subTitle: document.getElementById('sub_title').value,
                content: content,
                reservationTime: document.getElementById('reservation_time').value,
                newsType: news_type,
                mainCategoryCd: mainCategory.value, // 대분류 값
                subCategoryCd: subCategory.value,
                writer: writer
            };

            fetch('/api/cms/news', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(newsData)
            })
                .then(response => response.json())
                .then(data => {
                    alert("저장 성공!");
                    window.location.href = "/cms/";
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("저장 실패!");
                });
        });
    });
</script>

</body>
</html>
