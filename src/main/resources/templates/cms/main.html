<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>대시보드</title>
  <link rel="stylesheet" href="/css/cms/main.css">
    <link rel="stylesheet" href="/css/cms/sidebar.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<body>
<div class="wrap">
    <div th:replace="~{layout/cms/side_menu :: side_menu}"></div>
    <div class="dash_board">
        <h1> 뉴스 룸</h1>
        <div class="news_reg"><a href="/cms/regist">기사등록</a></div>
        <table class="news_list_wrap">
            <thead>
            <tr>
                <th>제목</th>
                <th>기자명</th>
                <th>작성시간</th>
            </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
        <div class="pagination">
            <button id="prevPage">이전</button>
            <span id="pageInfo"></span>
            <button id="nextPage">다음</button>
        </div>
    </div>

    <div class="session_2">
          <div class="photo_show">
              <div class="photo">
                  <p>사진</p>
                  <div class="photo_wrap">
                      <div class="img_content">
                          <img src="/uploads/image1_20250223_153600198.jpg">
                          <img src="/uploads/qweqw.png">
                          <img src="/uploads/cvbcvb.png">
                      </div>
                      <div class="img_content">
                          <img src="/uploads/gfgdfg.png">
                          <img src="/uploads/스크린샷%202025-02-23%20165045.png">
                          <img src="/uploads/ggfdger.png">
                      </div>

                  </div>
              </div>
          </div
        <div class="notice_wrap">
            <p>공지사항</p>
            <table class="tbl_notice_wrap">
                <thead>
                    <tr>
                        <th>제목</th>
                        <th>작성자</th>
                        <th>게재일</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>공지사항</td><td>박미미</td><td>2025.12.25</td></tr>
                    <tr><td>공지사항</td><td>박미미</td><td>2025.12.25</td></tr>
                    <tr><td>공지사항</td><td>박미미</td><td>2025.12.25</td></tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
<script>
    let currentPage = 1;
    const pageSize = 5;

    window.onload = function () {
        getAllNews(currentPage);
    };

    async function getAllNews(currentPage) {
        try {
            let response = await axios.get(`/api/cms/news/paged?currentPage=${currentPage}&size=${pageSize}`);
            console.log("불러온 데이터:", response.data);

            if (response.data.length === 0) {
                alert("불러올 뉴스가 없습니다.");
                return;
            }
            updateNewsTable(response.data.newsList);
            let totalPages = response.data.totalPages;
            updatePagination(response.data.currentPage, totalPages);
        } catch (error) {
            console.error("불러오기 실패:", error);
            alert("불러오기 실패");
        }
    }
    function updatePagination(currentPage, totalPages) {
        let paginationContainer = document.querySelector(".pagination");
        paginationContainer.innerHTML = ""; // 기존 버튼 초기화

        let prevButton = document.createElement("button");
        prevButton.innerText = "이전";
        prevButton.disabled = currentPage === 1;
        prevButton.onclick = function () {
            if (currentPage > 1) getAllNews(--currentPage);
        };
        paginationContainer.appendChild(prevButton);

        // 페이지 번호 추가
        for (let i = 1; i <= totalPages; i++) {
            let pageButton = document.createElement("button");
            pageButton.innerText = i;
            if (i === currentPage) {
                pageButton.style.fontWeight = "bold"; // 현재 페이지 강조
            }
            pageButton.onclick = function () {
                getAllNews(i);
            };
            paginationContainer.appendChild(pageButton);
        }

        let nextButton = document.createElement("button");
        nextButton.innerText = "다음";
        nextButton.disabled = currentPage === totalPages;
        nextButton.onclick = function () {
            if (currentPage < totalPages) getAllNews(++currentPage);
        };
        paginationContainer.appendChild(nextButton);
    }

    function updateNewsTable(newsList) {
        let tbody = document.querySelector(".news_list_wrap tbody");
        tbody.innerHTML = ""; // 기존 데이터 초기화

        newsList.forEach(news => {
            let row =
                document.createElement("tr");
            row.innerHTML = `
                <td>${news.title}</a></td>
                <td>${news.writer}</td>
                <td>${news.credateDt}</td>
            `;
            tbody.appendChild(row);
        });
    }
</script>

</body>
</html>
