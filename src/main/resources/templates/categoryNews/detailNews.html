<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>대시보드</title>
    <link rel="stylesheet" href="/css/news-detail.css">
    <link rel="stylesheet" href="/css/common.css"> <!-- 공통 스타일 적용 -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/javascript/axios.js"></script>
    <script src="/javascript/layout/footer.js"></script>
</head>
<body>
<div class="wrap">
    <div th:replace="layout/header :: header"></div>
    <span th:if="${session.user != null}" class="user-info">
        <input type="hidden" th:value="${session.user.username}" name="userId" id="userId">
    </span>
    <input type="hidden" name="newsId" th:value="${newsId}" id="newsId">


    <div class="news_detail_container">
        <h1><span th:text="${category}"></span></h1>
        <hr>
        <div id="news-content">

        </div>
    </div>
    <hr>
    <div class="subscription"></div>
    <div class="subscription-count"></div>
</div>

    <script>
        window.onload = function()  {
            getNews();
        }

        function getNews(){
            const newsId = document.getElementById("newsId").value;

            axios.get(`/api/category/news/detail/${newsId}`)
                .then(response => {
                    const news = response.data;
                    const newsContent = document.getElementById('news-content');

                    newsContent.innerHTML = `
                <h1>${news.title}</h1>
                <h2>${news.subTitle || '부제목 없음'}</h2>
                <p><strong>작성일:</strong> ${news.credateDt || 'N/A'}</p>
                <p><strong>기자:</strong> ${news.writer || 'N/A'}</p>
                <div class="news-content">${news.content ? news.content.replace(/\n/g, "<br>") : '내용 없음'}</div>
            `;
                    getReport(newsId);
                })
                .catch(error => {
                    console.error("뉴스 불러오기 실패:", error);
                });
        }

        function getReport(newsId) {

            let writerWrap = document.getElementById("writer_wrap");

            if (!writerWrap) {
                writerWrap = document.createElement("div");
                writerWrap.id = "writer_wrap";
                document.body.appendChild(writerWrap);
            }
            axios.get(`/api/category/reporter/${newsId}`)
                .then(response => {
                    console.log("리포터 데이터:", response.data);
                    if (response.data) {
                        const reporter = response.data[0];
                        writerWrap.innerHTML = `
                            <div class="writer_wrap">
                                <div class="report-content">
                                    <div class="img_wrap">
                                        <img src="${reporter.filePath || '/images/default.png'}" alt="Reporter Image">
                                    </div>
                                    <p>${reporter.writer}</p>
                                    <p>${reporter.department}</p>
                                </div>
                            </div>

                `;
                }
            });
        }

    </script>

</body>
</html>
