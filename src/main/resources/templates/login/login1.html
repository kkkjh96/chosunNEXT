<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/common.css"> <!-- 공통 스타일 적용 -->
    <link rel="stylesheet" href="/css/login/login.css"> <!-- 공통 스타일 적용 -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/javascript/axios.js"></script>
</head>
<body>
    <!-- Header Fragment Include -->
    <div th:replace="layout/header :: header"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- 이 섹션 안에 추가 하시면 됩니다. -->
        <!-- 이 섹션 안에 추가 하시면 됩니다. -->
        <div class="login-form-container">
            <h2>로그인</h2>
            <form id="login-form" onsubmit="return validateLoginForm()">
                <label class="label" for="login-email">이메일</label>
                <input class="input" type="email" id="login-email" name="email" placeholder="이메일을 입력하세요">
                <span class="error-message" id="login-email-error"></span>

                <label class="label" for="login-password">비밀번호</label>
                <input class="input" type="password" id="login-password" name="password" placeholder="비밀번호를 입력하세요">
                <span class="error-message" id="login-password-error"></span>

                <button class="btn-login" type="submit">로그인</button>
            </form>

            <!-- 기타 옵션 -->
            <div class="login-options">
                <a href="/forgot-password" class="forgot-password-link">비밀번호를 잊으셨나요?</a>
                <a href="/register" class="signup-link">회원가입</a>
            </div>
        </div>
    </div>

    <!-- Footer Fragment Include -->
    <div th:replace="layout/footer :: footer"></div>

</body>
</html>
<script src="/javascript/login/login.js"></script>
