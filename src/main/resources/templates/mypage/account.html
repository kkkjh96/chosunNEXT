<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/mypage-common.css"> <!-- 공통 스타일 적용 -->
    <link rel="stylesheet" href="/css/mypage/mypage-account.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script> <!-- 카카오 지도 API -->
    <script src="/javascript/axios.js"></script>
</head>
<body>

    <!-- Header Fragment Include -->
    <div th:replace="layout/mypage-header :: header"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- 이 섹션 안에 추가 하시면 됩니다. -->
        <div class="account-container">
            <h2 class="account-title">계정 정보</h2>

            <!-- 🔹 비밀번호 확인 창 -->
            <div class="password-check-container">
                <label class="form-label">비밀번호 확인</label>
                <input type="password" class="form-input-password" id="passwordCheck" placeholder="비밀번호 입력">
                <button class="btn btn-primary" id="passwordCheckBtn">확인</button>
            </div>

            <!-- 🔹 계정 정보 창 -->
            <div class="user-info-container" style="display: none;">

                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" class="form-input" id="email" readonly>
                </div>

                <div class="form-group">
                    <label class="form-label">닉네임</label>
                    <input type="text" class="form-input" id="nickname">
                </div>

                <div class="form-group">
                    <label class="form-label">성별</label>
                    <select class="form-input" id="gender">
                        <option value="">선택</option>
                        <option value="남성">남성</option>
                        <option value="여성">여성</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">생년월일</label>
                    <input type="date" class="form-input" id="birth">
                </div>

                <div class="form-group">
                    <label class="form-label">전화번호</label>
                    <input type="text" class="form-input" id="phone" placeholder="010-1234-5678">
                </div>

                <!-- 🔹 주소 입력 -->
                <div class="form-group">
                    <label class="form-label">주소</label>
                    <input type="text" class="form-input" id="address" placeholder="주소 입력">
                    <button class="btn btn-secondary" onclick="searchAddress()">주소 검색</button>
                </div>

                <div class="form-group">
                    <label class="form-label">상세 주소</label>
                    <input type="text" class="form-input" id="address2">
                </div>

                <div class="form-group">
                    <label class="form-label">우편번호</label>
                    <input type="text" class="form-input" id="zipCd">
                </div>

                <!-- 🔹 버튼 -->
                <div class="button-group">
                    <button class="btn btn-primary" id="updateInfoBtn">정보 수정</button>
                    <button class="btn btn-warning" id="updatePasswordBtn">비밀번호 변경</button>
                    <button class="btn btn-danger" id="deleteAccountBtn">회원 탈퇴</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer Fragment Include -->
    <div th:replace="layout/mypage-footer :: footer"></div>
<script src="/javascript/mypage/mypage-account.js"></script>

</body>
</html>
<!-- 차트 스크립트 -->
