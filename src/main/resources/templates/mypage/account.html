<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/mypage-common.css"> <!-- 공통 스타일 적용 -->
    <link rel="stylesheet" href="/css/mypage/mypage-account.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/javascript/axios.js"></script>
</head>
<body>

    <!-- Header Fragment Include -->
    <div th:replace="layout/mypage-header :: header"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- 이 섹션 안에 추가 하시면 됩니다. -->
        <div class="account-container">
            <h2 class="account-title">계정 정보</h2>

            <!-- 🔹 비밀번호 확인 창 -->
            <div class="password-check-container">
                <label class="form-label">비밀번호 확인</label>
                <input type="password" class="form-input-password" id="passwordCheck" placeholder="비밀번호 입력">
                <button class="btn btn-primary" id="passwordCheckBtn">확인</button>
            </div>

            <!-- 🔹 계정 정보 창 -->
            <div class="user-info-container" style="display: none;">

                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" class="form-input" id="email" readonly>
                </div>

                <div class="form-group">
                    <label class="form-label">닉네임</label>
                    <input type="text" class="form-input" id="nickname">
                </div>

                <div class="form-group">
                    <label class="form-label">성별</label>
                    <select class="form-input" id="gender">
                        <option value="">선택</option>
                        <option value="M">남성</option>
                        <option value="F">여성</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">생년월일</label>
                    <input type="date" class="form-input" id="birth">
                </div>

                <div class="form-group">
                    <label class="form-label">전화번호</label>
                    <input type="text" class="form-input" id="phone" placeholder="010-1234-5678">
                </div>

                <!-- 🔹 주소 입력 -->
                <div class="form-group">
                    <label class="form-label">주소</label>
                    <input type="text" class="form-input" id="address" placeholder="주소 입력">
                    <button class="btn btn-secondary" onclick="searchAddress()">주소 검색</button>
                </div>

                <div class="form-group">
                    <label class="form-label">상세 주소</label>
                    <input type="text" class="form-input" id="address2">
                </div>

                <div class="form-group">
                    <label class="form-label">우편번호</label>
                    <input type="text" class="form-input" id="zipCd">
                </div>

                <!-- 🔹 버튼 -->
                <div class="button-group">
                    <!-- ✅ 정보 수정 버튼 (가운데, 크기 확대) -->
                    <button id="updateInfoBtn" class="btn btn-primary update-info-btn">정보 수정</button>

                    <!-- ✅ 비밀번호 변경, 회원 탈퇴 버튼 (아래쪽 좌우 정렬) -->
                    <div class="sub-buttons">
                        <button id="updatePasswordBtn" class="btn btn-warning">비밀번호 변경</button>
                        <button id="deleteAccountBtn" class="btn btn-danger">회원 탈퇴</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 🔹 비밀번호 변경 & 회원 탈퇴 모달 -->
        <div id="accountModal" class="modal">
            <div class="modal-content">
                <h2 id="modalTitle">비밀번호 변경</h2>
                <p id="modalDescription">비밀번호를 변경하려면 현재 비밀번호를 입력하세요.</p>

                <label for="modalPassword">현재 비밀번호</label>
                <input type="password" id="modalPassword" class="modal-input" placeholder="비밀번호 입력">

                <!-- 🔹 비밀번호 변경 시 추가 입력란 -->
                <div id="newPasswordFields">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" class="modal-input" placeholder="새 비밀번호 입력">

                    <label for="confirmNewPassword">새 비밀번호 확인</label>
                    <input type="password" id="confirmNewPassword" class="modal-input" placeholder="새 비밀번호 확인">
                </div>

                <div class="modal-buttons">
                    <button id="modalConfirmBtn" class="btn btn-primary" onclick="confirmAction()">확인</button>
                    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer Fragment Include -->
    <div th:replace="layout/mypage-footer :: footer"></div>
    <!-- ✅ 카카오 우편번호 API 추가 -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script src="/javascript/mypage/mypage-account.js"></script>

</body>
</html>
<!-- 차트 스크립트 -->
