<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <link rel="stylesheet" href="/css/mypage-common.css"> <!-- 공통 스타일 적용 -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/javascript/mypage/mypage-main.js"></script>
    <script src="/javascript/axios.js"></script>
</head>
<body>
<!-- Header Fragment Include -->
<div th:replace="layout/mypage-header :: header"></div>

<!-- Main Content -->
<div class="main-content">
    <!-- 페이지 메뉴 섹션 -->
    <section class="menu-section">
        <div class="menu-title-and-links">
            <h1>마이페이지</h1>
            <nav class="page-menu">
                <ul>
                    <li><a href="/mypage/library">보관함</a></li>
                    <li><a href="/mypage/subscriptions">구독함</a></li>
                    <li><a href="/mypage/account">계정 정보</a></li>
                    <li><a href="/mypage/orders">결제 내역</a></li>
                    <li><a href="/mypage/coupons">쿠폰함</a></li>
                </ul>
            </nav>
        </div>
    </section>

    <!-- 환영 배너 -->
    <section class="welcome-banner">
        <p id="username"></p>
        <button class="logout-button" onclick="logout()">로그아웃</button>
    </section>

    <!-- 사용 정보 요약 -->
    <section class="user-info-section">
        <div class="info-box">
            <h3>멤버십 사용기간</h3>
            <p>이용권 구매하기</p>
        </div>
        <div class="info-box">
            <h3>나의 레벨</h3>
            <p id="level"></p>
        </div>
        <div class="info-box">
            <h3>나의 포인트</h3>
            <p id="points"></p>
        </div>
    </section>

    <!-- 차트 및 활동 보관함 -->
    <section class="stats-and-activity-section">
        <h2>하루 30분, 세상 돌아보기</h2>
        <div class="stats-activity-grid">
            <!-- 차트 영역 -->
            <div class="chart-container">
                <canvas id="activityChart"></canvas>
            </div>

            <!-- 나의 활동 보관함 -->
            <div class="activity-summary-section">
                <h2>나의 활동 보관함</h2>
                <div class="activity-summary-grid">
                    <div class="activity-box">
                        <h3>최근 본</h3>
                        <p id="recentRead"></p>
                    </div>
                    <div class="activity-box">
                        <h3>구독한</h3>
                        <p id="subscribed"></p>
                    </div>
                    <div class="activity-box">
                        <h3>북마크</h3>
                        <p id="bookmarked"></p>
                    </div>
                    <div class="activity-box">
                        <h3>투고한</h3>
                        <p id="posted"></p>
                    </div>
                    <div class="activity-box">
                        <h3>공감한</h3>
                        <p id="liked"></p>
                    </div>
                    <div class="activity-box">
                        <h3>댓글 단</h3>
                        <p id="commented"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<!-- Footer Fragment Include -->
<div th:replace="layout/mypage-footer :: footer"></div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
