<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/mypage-common.css"> <!-- 공통 스타일 적용 -->
    <link rel="stylesheet" href="/css/mypage/mypage-coupon.css"> <!-- 공통 스타일 적용 -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/javascript/axios.js"></script>
</head>
<body>

    <!-- Header Fragment Include -->
    <div th:replace="layout/mypage-header :: header"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- 이 섹션 안에 추가 하시면 됩니다. -->

        <div class="coupon-container">
            <h2>쿠폰 등록</h2>
            <p>쿠폰 번호를 입력하세요:</p>
            <input type="text" id="couponCode" class="coupon-input" placeholder="0000-0000-0000-0000" maxlength="19">
            <button id="registerCouponBtn" class="btn btn-primary">등록</button>
            <p id="couponMessage"></p>
        </div>

    </div>

    <!-- Footer Fragment Include -->
    <div th:replace="layout/mypage-footer :: footer"></div>
    <script src="/javascript/mypage/mypage-coupon.js"></script>
</body>
</html>
<!-- 차트 스크립트 -->
