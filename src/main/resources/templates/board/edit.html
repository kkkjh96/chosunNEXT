<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/common.css"> <!-- 공통 스타일 적용 -->
    <link rel="stylesheet" href="/css/board/edit.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/javascript/axios.js"></script>
</head>
<body>
<!-- Header Fragment Include -->
<div th:replace="layout/header :: header"></div>

<!-- Main Content -->
<div class="main-content">
    <!-- 이 섹션 안에 추가 하시면 됩니다. -->

    <div class="container">
        <h1>게시글 수정</h1>

        <form id="editPostForm" method="POST" enctype="multipart/form-data">
            <div>
                <label for="title">제목</label>
                <input type="text" id="title" name="title" required />
            </div>

            <div>
                <label for="editor">내용</label>
                <div id="editor"></div>
            </div>

            <div>
                <label for="files">이미지 추가</label>
                <input type="file" name="files" id="files" multiple />
            </div>

            <button type="submit">수정 완료</button>
        </form>
    </div>

</div>

<!-- Footer Fragment Include -->
<div th:replace="layout/footer :: footer"></div>

<script src="/javascript/board/edit.js"></script>
<script src="/javascript/layout/header.js"></script>
<script src="/javascript/layout/footer.js"></script>
</body>
</html>
